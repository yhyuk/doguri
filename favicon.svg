<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 배경 원 -->
  <circle cx="16" cy="16" r="15" fill="#3B82F6"/>

  <!-- 도구 아이콘 (렌치와 망치 교차) -->
  <!-- 렌치 -->
  <g transform="rotate(-45 16 16)">
    <rect x="14" y="8" width="4" height="12" fill="white"/>
    <circle cx="16" cy="8" r="3" fill="none" stroke="white" stroke-width="2"/>
    <rect x="13" y="18" width="6" height="3" rx="1" fill="white"/>
  </g>

  <!-- 망치 -->
  <g transform="rotate(45 16 16)">
    <rect x="14.5" y="10" width="3" height="10" fill="white"/>
    <rect x="12" y="7" width="8" height="4" rx="1" fill="white"/>
  </g>
</svg>